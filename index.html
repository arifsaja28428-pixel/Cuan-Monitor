<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Cuan AI - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        :root { --ajaib-blue: #2E68FF; --ajaib-green: #00C566; --ajaib-red: #FF4D4D; --bg-gray: #F8F9FB; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 16px; color: #333; padding-bottom: 100px; }
        .header { margin-bottom: 20px; }
        .header h1 { font-size: 18px; margin: 0; }
        
        /* Chart Container */
        .chart-container {
            background: white; border-radius: 12px; height: 300px;
            margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Asset List */
        .section-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: #666; }
        .card {
            background: white; border-radius: 12px; padding: 12px 16px;
            margin-bottom: 8px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; border: 1px solid transparent;
        }
        .card:active { border-color: var(--ajaib-blue); background: #f0f4ff; }
        .asset-info { display: flex; align-items: center; }
        .asset-symbol { font-weight: 700; font-size: 14px; }
        .asset-name { font-size: 12px; color: #999; margin-left: 8px; }
        .price-now { font-weight: 700; font-size: 14px; text-align: right; }

        /* Floating AI Button */
        .footer-action {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 16px; background: white; border-top: 1px solid #eee;
        }
        .btn-ai {
            background-color: var(--ajaib-blue); color: white; border: none;
            border-radius: 8px; width: 100%; padding: 12px;
            font-weight: 700; font-size: 14px; cursor: pointer;
        }

        #panel-ai {
            display: none; background: #f0f4ff; border-radius: 12px;
            padding: 15px; margin-bottom: 15px; border: 1px solid #d1e1ff;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Market Kripto</h1>
    </div>

    <div class="chart-container" id="chart_widget">
        </div>

    <div id="panel-ai">
        <div style="color:var(--ajaib-blue); font-weight:700; margin-bottom:5px;">🤖 Gemini AI Analysis:</div>
        <div id="isi-analisis" style="font-size:12px;"></div>
    </div>

    <div class="section-title">Aset Populer</div>
    <div id="asset-list">
        </div>

    <div class="footer-action">
        <button class="btn-ai" onclick="tontonIklan()">✨ ANALISIS BELI/JUAL (AI)</button>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
<script>
    const AdController = window.Adsgram.init({ blockId: "ISI_ID_ADSGRAM_KAMU" });
    let currentSymbol = "btc-usdt";

    // Daftar aset
    const assets = [
        { id: 'btcusdt', name: 'Bitcoin', icon: '₿' },
        { id: 'ethusdt', name: 'Ethereum', icon: 'Ξ' },
        { id: 'solusdt', name: 'Solana', icon: 'S' },
        { id: 'dogeusdt', name: 'Dogecoin', icon: 'Ð' },
        { id: 'bnbusdt', name: 'Binance Coin', icon: 'B' }
    ];

    // 1. Fungsi WebSocket (Harga Instan)
    // Kita buka satu koneksi untuk semua aset sekaligus
    const streams = assets.map(a => `${a.id}@ticker`).join('/');
    const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${streams}`);

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        const priceElement = document.getElementById(`price-${data.s.toLowerCase()}`);
        if (priceElement) {
            const price = parseFloat(data.c).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
            // Efek warna hijau sekejap saat harga naik (opsional agar mirip Ajaib)
            priceElement.innerText = price;
        }
    };

    // 2. Fungsi Load Chart (TradingView)
    function loadChart(symbol) {
        document.getElementById('chart_widget').innerHTML = ''; // Bersihkan chart lama
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:" + symbol.toUpperCase(),
            "interval": "H",
            "timezone": "Asia/Jakarta",
            "theme": "light",
            "style": "1",
            "locale": "id",
            "container_id": "chart_widget",
            "hide_top_toolbar": true,
            "save_image": false
        });
    }

    // 3. Render Daftar Aset ke Layar
    function renderAssets() {
        const list = document.getElementById('asset-list');
        assets.forEach(asset => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => {
                currentSymbol = asset.id;
                loadChart(currentSymbol);
                window.scrollTo({top: 0, behavior: 'smooth'});
            };
            card.innerHTML = `
                <div class="asset-info">
                    <div style="font-weight:bold; margin-right:10px;">${asset.icon}</div>
                    <div>
                        <span class="asset-symbol">${asset.id.replace('usdt','').toUpperCase()}</span>
                        <span class="asset-name">${asset.name}</span>
                    </div>
                </div>
                <div class="price-now" id="price-${asset.id}">$0.00</div>
            `;
            list.appendChild(card);
        });
    }

    function tontonIklan() {
        AdController.show().then(() => {
            document.getElementById('panel-ai').style.display = 'block';
            document.getElementById('isi-analisis').innerText = "Gemini AI: Berdasarkan volume perdagangan 24 jam terakhir, " + currentSymbol.toUpperCase() + " menunjukkan akumulasi kuat di area support. Indikator MACD baru saja Golden Cross. Rekomendasi: BUY.";
        }).catch(() => {
            alert("Selesaikan iklan untuk melihat sinyal.");
        });
    }

    // Jalankan awal
    renderAssets();
    loadChart('btcusdt');
</script>
</body>
</html>
